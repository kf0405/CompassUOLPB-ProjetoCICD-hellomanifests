apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-app-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hello-app
  template:
    metadata:
      labels:
        app: hello-app
    spec:
      containers:
      - name: hello-app
        image: kf0405/hello-app:88b6e0a7a4a0416161099a0ee46b7b2db94782c1
        ports:
        - containerPort: 80
