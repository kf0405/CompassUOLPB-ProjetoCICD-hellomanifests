apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-app-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hello-app
  template:
    metadata:
      labels:
        app: hello-app
    spec:
      containers:
      - name: hello-app
        image: kf0405/hello-app:dbf06b822c8a3c47b7020e42f11d33e0c0bb7384
        ports:
        - containerPort: 80
